<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FFF8F0" />
    <meta name="description" content="ashrain.out — 기하학의 아름다움을 만나다" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ashrain.out" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ashrain.out</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Noto Serif KR', serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        overscroll-behavior: none;
      }
      #root { min-height: 100vh; min-height: 100dvh; }
      input, textarea, button { font-family: inherit; }
      /* Remove tap highlight on mobile */
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Eruda mobile debug console — 관리자 토글 기반 조건부 로드 (localStorage "ar_eruda" === "on" 일 때만) -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("ar_eruda") === "on") {
            var s = document.createElement("script");
            s.src = "https://cdn.jsdelivr.net/npm/eruda";
            s.onload = function () { try { window.eruda && window.eruda.init(); } catch (e) {} };
            document.body.appendChild(s);
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
